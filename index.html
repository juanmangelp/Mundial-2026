<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc,
      collection, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdcGWVbaF6Vf6Lfghrdun6jxWvkBx2YRI",
      authDomain: "prode2026-2eefa.firebaseapp.com",
      projectId: "prode2026-2eefa",
      storageBucket: "prode2026-2eefa.firebasestorage.app",
      messagingSenderId: "297919804411",
      appId: "1:297919804411:web:8caf1d592d0a438569515e"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);

    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin2026';

    // Base URL de los escudos — paladarnegro.net/escudoteca/mundial2026
    const CDN = 'https://paladarnegro.net/escudoteca/mundial2026/mundial2026/png/';

    const TEAMS = {
      'Argentina':      { rank:1,  flag:'🇦🇷', crest: CDN+'argentina.png' },
      'España':         { rank:2,  flag:'🇪🇸', crest: CDN+'espana.png' },
      'Francia':        { rank:3,  flag:'🇫🇷', crest: CDN+'francia.png' },
      'Inglaterra':     { rank:4,  flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', crest: CDN+'inglaterra.png' },
      'Brasil':         { rank:5,  flag:'🇧🇷', crest: CDN+'brasil.png' },
      'Portugal':       { rank:6,  flag:'🇵🇹', crest: CDN+'portugal.png' },
      'Holanda':        { rank:7,  flag:'🇳🇱', crest: CDN+'paisesbajos.png' },
      'Bélgica':        { rank:8,  flag:'🇧🇪', crest: CDN+'belgica.png' },
      'Alemania':       { rank:12, flag:'🇩🇪', crest: CDN+'alemania.png' },
      'Italia':         { rank:11, flag:'🇮🇹', crest: CDN+'italia.png' },
      'Marruecos':      { rank:14, flag:'🇲🇦', crest: CDN+'marruecos.png' },
      'Senegal':        { rank:18, flag:'🇸🇳', crest: CDN+'senegal.png' },
      'México':         { rank:16, flag:'🇲🇽', crest: CDN+'mexico.png' },
      'Uruguay':        { rank:20, flag:'🇺🇾', crest: CDN+'uruguay.png' },
      'Suiza':          { rank:19, flag:'🇨🇭', crest: CDN+'suiza.png' },
      'Dinamarca':      { rank:22, flag:'🇩🇰', crest: CDN+'dinamarca.png' },
      'Australia':      { rank:23, flag:'🇦🇺', crest: CDN+'australia.png' },
      'Corea del Sur':  { rank:24, flag:'🇰🇷', crest: CDN+'coreadelsur.png' },
      'Polonia':        { rank:25, flag:'🇵🇱', crest: CDN+'polonia.png' },
      'Japón':          { rank:15, flag:'🇯🇵', crest: CDN+'japon.png' },
      'Ecuador':        { rank:42, flag:'🇪🇨', crest: CDN+'ecuador.png' },
      'Túnez':          { rank:34, flag:'🇹🇳', crest: CDN+'tunez.png' },
      'Arabia Saudita': { rank:58, flag:'🇸🇦', crest: CDN+'arabiasaudita.png' },
      'Ghana':          { rank:65, flag:'🇬🇭', crest: CDN+'ghana.png' },
      'Serbia':         { rank:33, flag:'🇷🇸', crest: CDN+'serbia.png' },
      'Camerún':        { rank:43, flag:'🇨🇲', crest: CDN+'camerun.png' },
      'Costa Rica':     { rank:50, flag:'🇨🇷', crest: CDN+'costarica.png' },
      'Canadá':         { rank:47, flag:'🇨🇦', crest: CDN+'canada.png' },
    };

    // ── Estado ──
    let currentUser  = null;
    let currentView  = 'matches';
    let matchFilter  = 'all';
    let adminFilter  = 'pending';
    let isRegister   = false;
    let allUsers     = {};
    let results      = {};
    let unsubUsers   = null;
    let unsubRes     = null;

    // ── Fixture ──
    const MATCHES = [
      {id:1,  group:'A', home:'México',        away:'Polonia',       date:'2026-06-11', time:'18:00', venue:'Estadio Azteca'},
      {id:2,  group:'A', home:'Arabia Saudita',away:'Argentina',     date:'2026-06-12', time:'15:00', venue:'Dallas'},
      {id:3,  group:'B', home:'Francia',       away:'Australia',     date:'2026-06-12', time:'18:00', venue:'NY/NJ'},
      {id:4,  group:'B', home:'Dinamarca',     away:'Túnez',         date:'2026-06-13', time:'15:00', venue:'Miami'},
      {id:5,  group:'C', home:'Argentina',     away:'Polonia',       date:'2026-06-16', time:'21:00', venue:'Miami'},
      {id:6,  group:'C', home:'México',        away:'Arabia Saudita',date:'2026-06-17', time:'15:00', venue:'Los Angeles'},
      {id:7,  group:'D', home:'Brasil',        away:'Serbia',        date:'2026-06-14', time:'18:00', venue:'San Francisco'},
      {id:8,  group:'D', home:'Suiza',         away:'Camerún',       date:'2026-06-15', time:'15:00', venue:'Seattle'},
      {id:9,  group:'E', home:'España',        away:'Costa Rica',    date:'2026-06-15', time:'18:00', venue:'Boston'},
      {id:10, group:'E', home:'Alemania',      away:'Japón',         date:'2026-06-16', time:'21:00', venue:'Kansas City'},
      {id:11, group:'F', home:'Uruguay',       away:'Corea del Sur', date:'2026-06-17', time:'18:00', venue:'Dallas'},
      {id:12, group:'F', home:'Portugal',      away:'Ghana',         date:'2026-06-18', time:'15:00', venue:'Filadelfia'},
      {id:13, group:'G', home:'Inglaterra',    away:'Senegal',       date:'2026-06-19', time:'21:00', venue:'NY/NJ'},
      {id:14, group:'G', home:'Holanda',       away:'Ecuador',       date:'2026-06-20', time:'18:00', venue:'Houston'},
      {id:15, group:'H', home:'Italia',        away:'Marruecos',     date:'2026-06-21', time:'15:00', venue:'Los Angeles'},
      {id:16, group:'H', home:'Bélgica',       away:'Canadá',        date:'2026-06-22', time:'18:00', venue:'Vancouver'},
      {id:17, group:'A', home:'Argentina',     away:'México',        date:'2026-06-26', time:'20:00', venue:'Dallas'},
      {id:18, group:'B', home:'Francia',       away:'Dinamarca',     date:'2026-06-26', time:'20:00', venue:'Miami'},
      {id:19, group:'C', home:'España',        away:'Alemania',      date:'2026-06-30', time:'21:00', venue:'Los Angeles'},
      {id:20, group:'D', home:'Brasil',        away:'Portugal',      date:'2026-07-01', time:'21:00', venue:'Miami'},
    ];

    // ── Helpers ──
    const isAdmin = () => currentUser === ADMIN_USER;

    function getMatchStatus(m) {
      const diff = (new Date(`${m.date}T${m.time}:00`) - new Date()) / 60000;
      if (diff > 30)   return 'open';
      if (diff > -110) return 'live';
      return 'closed';
    }

    function getCountdown(m) {
      const diff = new Date(`${m.date}T${m.time}:00`) - new Date() - 1800000;
      if (diff <= 0) return null;
      const h = Math.floor(diff/3600000), mn = Math.floor((diff%3600000)/60000);
      return h > 48 ? `Cierra en ${Math.floor(h/24)}d` : `Cierra en ${h}h ${mn}m`;
    }

    function formatDate(d, t) {
      return new Date(`${d}T${t}:00`).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}) + ' · ' + t;
    }

    function calcScore(u) {
      let pts=0, exact=0, winner=0;
      for (const [mid, p] of Object.entries(u.predictions||{})) {
        const r = results[mid];
        if (!r) continue;
        if (p.home===r.home && p.away===r.away) { pts+=3; exact++; }
        else {
          const pw=p.home>p.away?1:p.home<p.away?-1:0, rw=r.home>r.away?1:r.home<r.away?-1:0;
          if (pw===rw) { pts+=1; winner++; }
        }
      }
      return {pts,exact,winner};
    }

    function showToast(msg, type='ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type==='err'?' toast-err':'');
      setTimeout(()=>t.classList.remove('show'), 2800);
    }

    // ── Bloque de equipo con escudo real ──
    function teamBlock(name) {
      const t = TEAMS[name] || { flag:'⚽', rank:null, crest:'' };
      return `
        <div class="team">
          <div class="team-crest-wrap">
            <img
              src="${t.crest}"
              class="team-crest"
              alt="${name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="team-crest-fallback">${t.flag}</div>
          </div>
          <span class="team-name">${name}</span>
          ${t.rank ? `<span class="team-rank">#${t.rank} FIFA</span>` : ''}
        </div>`;
    }

    // ── Firebase ──
    function startListening() {
      if (unsubUsers) unsubUsers();
      if (unsubRes)   unsubRes();
      unsubUsers = onSnapshot(collection(db,'users'), snap => {
        allUsers = {}; snap.forEach(d => { allUsers[d.id] = d.data(); }); render();
      });
      unsubRes = onSnapshot(doc(db,'config','results'), snap => {
        results = snap.exists() ? snap.data() : {}; render();
      });
    }

    // ── RENDER ──
    function render() {
      const app = document.getElementById('app');
      if (!currentUser) { app.innerHTML = renderLogin(); return; }
      app.innerHTML = `
        <div class="header">
          <div class="logo">🏆 PRODE MUNDIAL 2026</div>
          <div class="user-info">
            ${isAdmin()?'<span class="admin-badge">⚙️ ADMIN</span>':''}
            <div class="avatar">${(allUsers[currentUser]?.name||currentUser).substring(0,2).toUpperCase()}</div>
            <span>${allUsers[currentUser]?.name||currentUser}</span>
            <button class="btn-logout" onclick="window.__logout()">Salir</button>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-btn ${currentView==='matches'?'active':''}" onclick="window.__setView('matches')">⚽ Partidos</button>
          <button class="nav-btn ${currentView==='leaderboard'?'active':''}" onclick="window.__setView('leaderboard')">🏅 Tabla</button>
          <button class="nav-btn ${currentView==='mypreds'?'active':''}" onclick="window.__setView('mypreds')">📋 Mis pronósticos</button>
          ${isAdmin()?`<button class="nav-btn admin-nav ${currentView==='admin'?'active':''}" onclick="window.__setView('admin')">⚙️ Panel Admin</button>`:''}
        </nav>
        <div class="main">${renderView()}</div>`;
    }

    function renderView() {
      if (currentView==='matches')     return renderMatches();
      if (currentView==='leaderboard') return renderLeaderboard();
      if (currentView==='mypreds')     return renderMyPreds();
      if (currentView==='admin'&&isAdmin()) return renderAdmin();
      return '';
    }

    // ── Partidos ──
    function renderMatches() {
      const labels = {all:'Todos',open:'Abiertos',closed:'Cerrados'};
      const filtered = MATCHES.filter(m => matchFilter==='all' || getMatchStatus(m)===matchFilter);
      const preds = allUsers[currentUser]?.predictions||{};

      const cards = filtered.map(m => {
        const status=getMatchStatus(m), pred=preds[m.id]||{}, res=results[m.id], cd=getCountdown(m), isOpen=status==='open';
        return `
        <div class="match-card">
          <div class="match-header">
            <div>
              <div class="group-label">GRUPO ${m.group} · ${m.venue}</div>
              <div class="match-date">${formatDate(m.date,m.time)}</div>
              ${cd?`<div class="countdown">⏱ ${cd}</div>`:''}
            </div>
            <span class="match-status ${status==='open'?'status-open':status==='live'?'status-live':'status-closed'}">
              ${status==='open'?'ABIERTO':status==='live'?'🔴 EN VIVO':'CERRADO'}
            </span>
          </div>
          <div class="match-teams">
            ${teamBlock(m.home)}
            <div class="vs-zone">
              ${res?`<div class="result-final">${res.home} - ${res.away}</div><div class="result-label">RESULTADO FINAL</div>`:''}
              <div class="score-inputs">
                <input class="score-input" type="number" min="0" max="20" id="h${m.id}" value="${pred.home!==undefined?pred.home:''}" ${!isOpen?'disabled':''}>
                <span class="vs-text">-</span>
                <input class="score-input" type="number" min="0" max="20" id="a${m.id}" value="${pred.away!==undefined?pred.away:''}" ${!isOpen?'disabled':''}>
              </div>
              ${isOpen?`<button class="btn-predict" onclick="window.__savePred(${m.id})">Guardar</button>`:''}
              ${pred.home!==undefined?`<div class="prediction-saved">✓ ${pred.home}-${pred.away}</div>`:''}
            </div>
            ${teamBlock(m.away)}
          </div>
        </div>`;
      }).join('');

      return `
        <div class="section-title">Partidos</div>
        <div class="filter-bar">
          ${Object.entries(labels).map(([k,v])=>`<button class="filter-btn ${matchFilter===k?'active':''}" onclick="window.__setFilter('${k}')">${v}</button>`).join('')}
        </div>
        ${cards||'<div class="empty-state"><div class="icon">🔍</div><p>No hay partidos en esta categoría</p></div>'}`;
    }

    // ── Tabla ──
    function renderLeaderboard() {
      const ranking = Object.entries(allUsers)
        .filter(([k])=>k!==ADMIN_USER)
        .map(([key,u])=>({key,name:u.name,...calcScore(u),predCount:Object.keys(u.predictions||{}).length}))
        .sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
      const rows = ranking.map((u,i)=>`
        <tr class="${u.key===currentUser?'highlight-row':''}">
          <td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="rank-n">${i+1}</span>`}</td>
          <td><span class="player-name">${u.name}${u.key===currentUser?' (vos)':''}</span></td>
          <td style="color:var(--muted)">${u.predCount}</td>
          <td style="color:var(--gold)">${u.exact}</td>
          <td style="color:#4ac261">${u.winner}</td>
          <td><span class="pts">${u.pts}</span> <span class="pts-label">pts</span></td>
        </tr>`).join('');
      return `
        <div class="section-title">Tabla de Posiciones</div>
        <div class="live-badge">🟢 Actualización en tiempo real</div>
        <div class="points-info">
          <h3>Sistema de puntos</h3>
          <div class="points-row"><span>Resultado exacto</span><span class="score-badge">3 pts</span></div>
          <div class="points-row"><span>Ganador correcto</span><span class="score-badge">1 pt</span></div>
          <div class="points-row"><span>Incorrecto</span><span class="score-badge">0 pts</span></div>
        </div>
        <table class="leaderboard-table">
          <thead><tr><th>#</th><th>Jugador</th><th>Pronóst.</th><th>Exactos</th><th>Ganador</th><th>Puntos</th></tr></thead>
          <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Aún no hay jugadores</td></tr>'}</tbody>
        </table>`;
    }

    // ── Mis pronósticos ──
    function renderMyPreds() {
      const preds=allUsers[currentUser]?.predictions||{}, entries=Object.entries(preds);
      if(!entries.length) return `
        <div class="section-title">Mis Pronósticos</div>
        <div class="empty-state"><div class="icon">📝</div><p>Aún no hiciste ningún pronóstico.<br>¡Entrá a Partidos y empezá a predecir!</p></div>`;
      let totalPts=0;
      const items=entries.map(([mid,pred])=>{
        const match=MATCHES.find(m=>m.id==mid); if(!match) return '';
        const res=results[mid], ht=TEAMS[match.home]||{}, at=TEAMS[match.away]||{};
        let tag='<span class="pred-result res-pending">Pendiente</span>';
        if(res){
          if(pred.home===res.home&&pred.away===res.away){tag='<span class="pred-result res-exact">+3 pts ★</span>';totalPts+=3;}
          else{const pw=pred.home>pred.away?1:pred.home<pred.away?-1:0,rw=res.home>res.away?1:res.home<res.away?-1:0;
            if(pw===rw){tag='<span class="pred-result res-winner">+1 pt ✓</span>';totalPts+=1;}
            else tag='<span class="pred-result res-wrong">0 pts ✗</span>';}
        }
        return `<div class="pred-item">
          <div class="pred-match">
            <div style="display:flex;align-items:center;gap:8px;font-weight:600">
              <img src="${ht.crest||''}" style="height:24px;width:auto;object-fit:contain" onerror="this.style.display='none'">
              ${match.home} vs ${match.away}
              <img src="${at.crest||''}" style="height:24px;width:auto;object-fit:contain" onerror="this.style.display='none'">
            </div>
            <div style="font-size:12px;color:var(--muted)">Grupo ${match.group} · ${formatDate(match.date,match.time)}</div>
          </div>
          <div><div class="pred-score">${pred.home} - ${pred.away}</div><div class="pred-score-label">mi pronóstico</div></div>
          ${res?`<div style="font-size:12px;color:var(--muted);text-align:center">Real:<br><strong style="color:var(--text)">${res.home}-${res.away}</strong></div>`:''}
          ${tag}
        </div>`;
      }).join('');
      return `
        <div class="section-title">Mis Pronósticos</div>
        <div class="my-score-banner"><span>Total acumulado</span><span class="pts">${totalPts} <span class="pts-label">pts</span></span></div>
        ${items}`;
    }

    // ── Admin ──
    function renderAdmin() {
      const played=MATCHES.filter(m=>results[m.id]), pending=MATCHES.filter(m=>!results[m.id]);
      const players=Object.entries(allUsers).filter(([k])=>k!==ADMIN_USER);
      const filteredMatches=MATCHES.filter(m=>{
        if(adminFilter==='pending') return !results[m.id];
        if(adminFilter==='played')  return !!results[m.id];
        return true;
      });
      return `
        <div class="section-title">⚙️ Panel de Administrador</div>
        <div class="admin-stats">
          <div class="stat-card"><div class="stat-num">${players.length}</div><div class="stat-label">Jugadores</div></div>
          <div class="stat-card"><div class="stat-num">${played.length}</div><div class="stat-label">Resultados cargados</div></div>
          <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-label">Sin resultado</div></div>
          <div class="stat-card"><div class="stat-num">${MATCHES.length}</div><div class="stat-label">Total partidos</div></div>
        </div>
        <div class="admin-section-title">📋 Cargar resultados</div>
        <div class="filter-bar">
          <button class="filter-btn ${adminFilter==='pending'?'active':''}" onclick="window.__setAdminFilter('pending')">⏳ Pendientes (${pending.length})</button>
          <button class="filter-btn ${adminFilter==='played'?'active':''}"  onclick="window.__setAdminFilter('played')">✅ Cargados (${played.length})</button>
          <button class="filter-btn ${adminFilter==='all'?'active':''}"     onclick="window.__setAdminFilter('all')">Todos</button>
        </div>
        <div class="admin-matches">
          ${filteredMatches.map(m=>{
            const res=results[m.id], has=!!res;
            const ht=TEAMS[m.home]||{}, at=TEAMS[m.away]||{};
            return `
            <div class="admin-match-card ${has?'has-result':''}">
              <div class="admin-match-info">
                <div class="admin-match-teams">
                  <img src="${ht.crest||''}" class="admin-mini-crest" onerror="this.style.display='none'">
                  <strong>${m.home}</strong>
                  <span class="admin-vs">vs</span>
                  <strong>${m.away}</strong>
                  <img src="${at.crest||''}" class="admin-mini-crest" onerror="this.style.display='none'">
                </div>
                <div class="admin-match-meta">Grupo ${m.group} · ${formatDate(m.date,m.time)} · ${m.venue}</div>
                ${has?`<div class="current-result-tag">✅ Resultado actual: <strong>${res.home} - ${res.away}</strong></div>`:'<div class="pending-tag">⏳ Sin resultado</div>'}
              </div>
              <div class="admin-result-zone">
                <div class="admin-score-row">
                  <div class="admin-team-col">
                    <img src="${ht.crest||''}" class="admin-flag-lg" onerror="this.style.display='none'">
                    <span class="admin-team-name">${m.home}</span>
                    <input class="admin-score-input" type="number" min="0" max="20" id="adm-h${m.id}" value="${res?res.home:''}" placeholder="0">
                  </div>
                  <div class="admin-divider">—</div>
                  <div class="admin-team-col">
                    <img src="${at.crest||''}" class="admin-flag-lg" onerror="this.style.display='none'">
                    <span class="admin-team-name">${m.away}</span>
                    <input class="admin-score-input" type="number" min="0" max="20" id="adm-a${m.id}" value="${res?res.away:''}" placeholder="0">
                  </div>
                </div>
                <div class="admin-actions">
                  <button class="btn-save-result ${has?'btn-update':''}" onclick="window.__saveResult(${m.id})">${has?'✏️ Actualizar':'✅ Guardar resultado'}</button>
                  ${has?`<button class="btn-clear-result" onclick="window.__clearResult(${m.id})">🗑 Borrar</button>`:''}
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div class="admin-section-title" style="margin-top:32px">👥 Jugadores (${players.length})</div>
        <div class="admin-players">
          ${players.length?players.map(([key,u])=>{const s=calcScore(u);return `
            <div class="admin-player-row">
              <div class="avatar" style="width:36px;height:36px;font-size:13px">${u.name.substring(0,2).toUpperCase()}</div>
              <div style="flex:1"><div style="font-weight:600">${u.name}</div><div style="font-size:12px;color:var(--muted)">@${key} · ${Object.keys(u.predictions||{}).length} pronósticos</div></div>
              <div style="text-align:right"><div class="pts" style="font-size:20px">${s.pts}</div><div class="pts-label">pts</div></div>
            </div>`;}).join(''):'<div style="color:var(--muted);padding:16px;font-size:14px">Sin jugadores aún</div>'}
        </div>`;
    }

    // ── Login ──
    function renderLogin() {
      return `
        <div class="login-page">
          <div class="login-box">
            <div class="login-trophy">🏆</div>
            <div class="login-title">PRODE 2026</div>
            <div class="login-sub">Mundial de Fútbol · USA · México · Canadá</div>
            <div id="login-error"></div>
            ${isRegister?`
              <div class="input-group"><label>Nombre completo</label><input type="text" id="inp-name" placeholder="Juan Pérez"></div>
              <div class="input-group"><label>Usuario (sin espacios)</label><input type="text" id="inp-user" placeholder="juan_perez"></div>`:`
              <div class="input-group"><label>Usuario</label><input type="text" id="inp-user" placeholder="usuario" autocomplete="username"></div>`}
            <div class="input-group">
              <label>Contraseña</label>
              <input type="password" id="inp-pass" placeholder="••••••••"
                autocomplete="${isRegister?'new-password':'current-password'}"
                onkeydown="if(event.key==='Enter') ${isRegister?'window.__doRegister()':'window.__doLogin()'}">
            </div>
            <button class="btn-primary" id="btn-submit" onclick="${isRegister?'window.__doRegister()':'window.__doLogin()'}">
              ${isRegister?'Crear cuenta':'Entrar al prode'}
            </button>
            <div class="login-toggle">
              ${isRegister?'¿Ya tenés cuenta? <a onclick="window.__toggleMode()">Iniciá sesión</a>':'¿No tenés cuenta? <a onclick="window.__toggleMode()">Registrate gratis</a>'}
            </div>
          </div>
        </div>`;
    }

    // ── Acciones ──
    window.__toggleMode     = () => { isRegister=!isRegister; render(); };
    window.__setView        = v  => { currentView=v; render(); };
    window.__setFilter      = f  => { matchFilter=f; render(); };
    window.__setAdminFilter = f  => { adminFilter=f; render(); };

    window.__doLogin = async () => {
      const user=document.getElementById('inp-user').value.trim().toLowerCase();
      const pass=document.getElementById('inp-pass').value;
      const errEl=document.getElementById('login-error'), btn=document.getElementById('btn-submit');
      if(!user||!pass){errEl.innerHTML='<div class="error-msg">Completá todos los campos</div>';return;}
      if(user===ADMIN_USER&&pass===ADMIN_PASS){currentUser=ADMIN_USER;allUsers[ADMIN_USER]={name:'Admin',predictions:{}};startListening();return;}
      btn.textContent='Verificando...'; btn.disabled=true;
      try {
        const snap=await getDoc(doc(db,'users',user));
        if(!snap.exists()||snap.data().password!==pass){errEl.innerHTML='<div class="error-msg">Usuario o contraseña incorrectos</div>';btn.textContent='Entrar al prode';btn.disabled=false;return;}
        currentUser=user; startListening();
      } catch(e){errEl.innerHTML='<div class="error-msg">Error de conexión</div>';btn.textContent='Entrar al prode';btn.disabled=false;}
    };

    window.__doRegister = async () => {
      const name=document.getElementById('inp-name')?.value.trim();
      const uname=document.getElementById('inp-user').value.trim().toLowerCase().replace(/\s+/g,'_');
      const pass=document.getElementById('inp-pass').value;
      const errEl=document.getElementById('login-error'), btn=document.getElementById('btn-submit');
      if(!name||!uname||!pass){errEl.innerHTML='<div class="error-msg">Completá todos los campos</div>';return;}
      if(pass.length<4){errEl.innerHTML='<div class="error-msg">Contraseña mínimo 4 caracteres</div>';return;}
      if(uname===ADMIN_USER){errEl.innerHTML='<div class="error-msg">Ese usuario no está disponible</div>';return;}
      btn.textContent='Creando...'; btn.disabled=true;
      try {
        const snap=await getDoc(doc(db,'users',uname));
        if(snap.exists()){errEl.innerHTML='<div class="error-msg">Ese usuario ya existe</div>';btn.textContent='Crear cuenta';btn.disabled=false;return;}
        await setDoc(doc(db,'users',uname),{name,password:pass,predictions:{},createdAt:Date.now()});
        currentUser=uname; startListening();
      } catch(e){errEl.innerHTML='<div class="error-msg">Error de conexión</div>';btn.textContent='Crear cuenta';btn.disabled=false;}
    };

    window.__logout = () => {
      if(unsubUsers){unsubUsers();unsubUsers=null;} if(unsubRes){unsubRes();unsubRes=null;}
      currentUser=null; currentView='matches'; allUsers={}; render();
    };

    window.__savePred = async (mid) => {
      const h=document.getElementById('h'+mid), a=document.getElementById('a'+mid);
      if(!h||!a||h.value===''||a.value===''){showToast('⚠️ Ingresá ambos marcadores','err');return;}
      try{await updateDoc(doc(db,'users',currentUser),{[`predictions.${mid}`]:{home:parseInt(h.value),away:parseInt(a.value)}});showToast('✅ Pronóstico guardado');}
      catch(e){showToast('❌ Error al guardar','err');}
    };

    window.__saveResult = async (mid) => {
      const h=document.getElementById('adm-h'+mid), a=document.getElementById('adm-a'+mid);
      if(!h||!a||h.value===''||a.value===''){showToast('⚠️ Ingresá ambos goles','err');return;}
      try{await setDoc(doc(db,'config','results'),{[mid]:{home:parseInt(h.value),away:parseInt(a.value)}},{merge:true});showToast('✅ Resultado guardado — puntos actualizados');}
      catch(e){showToast('❌ Error al guardar resultado','err');}
    };

    window.__clearResult = async (mid) => {
      if(!confirm('¿Borrar el resultado de este partido?')) return;
      try{const snap=await getDoc(doc(db,'config','results'));if(snap.exists()){const d=snap.data();delete d[mid];await setDoc(doc(db,'config','results'),d);}showToast('🗑 Resultado borrado');}
      catch(e){showToast('❌ Error al borrar','err');}
    };

    render();
  </script>
</body>
</html>
