    function getMatchStatus(m) {
      const diff = (new Date(`${m.date}T${m.time}:00`) - new Date()) / 60000;
      if (diff > 30) return 'open';
      if (diff > -110) return 'live';
      return 'closed';
    }
    function getCountdown(m) {
      const diff = new Date(`${m.date}T${m.time}:00`) - new Date() - 1800000;
      if (diff <= 0) return null;
      const h = Math.floor(diff/3600000), mn = Math.floor((diff%3600000)/60000);
      return h > 48 ? `Cierra en ${Math.floor(h/24)}d` : `Cierra en ${h}h ${mn}m`;
    }
    function formatDate(d, t) {
      return new Date(`${d}T${t}:00`).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}) + ' · ' + t;
    }
    function calcMatchPts(p, r) {
      if(!r) return null;
      let pts = 0;
      // +1 acertar ganador o empate
      const pw = p.home>p.away?1:p.home<p.away?-1:0;
      const rw = r.home>r.away?1:r.home<r.away?-1:0;
      if(pw===rw) pts += 1;
      // +1 acertar goles de 1 equipo
      const homeOk = p.home===r.home;
      const awayOk = p.away===r.away;
      if(homeOk || awayOk) pts += 1;
      // +1 adicional por acertar goles de los 2 equipos
      if(homeOk && awayOk) pts += 1;
      return pts;
    }

    function calcScore(u) {
      let pts=0, exact=0, winner=0;
      for (const [mid, p] of Object.entries(u.predictions||{})) {
        const r=results[mid]; if(!r) continue;
        const mp = calcMatchPts(p, r);
        pts += mp;
        if(p.home===r.home && p.away===r.away) exact++;
        else {
          const pw=p.home>p.away?1:p.home<p.away?-1:0,rw=r.home>r.away?1:r.home<r.away?-1:0;
          if(pw===rw) winner++;
        }
      }
      return {pts,exact,winner};
    }

    // Calcula racha actual de aciertos consecutivos (partidos jugados en orden cronológico)
    function calcStreak(u) {
      const preds = u.predictions || {};
      // Ordenar partidos jugados por fecha
      const playedMatches = MATCHES
        .filter(m => results[m.id] && preds[m.id])
        .sort((a,b) => new Date(b.date+'T'+b.time+':00') - new Date(a.date+'T'+a.time+':00'));
      let streak = 0;
      for (const m of playedMatches) {
        const mp = calcMatchPts(preds[m.id], results[m.id]);
        if(mp > 0) streak++;
        else break;
      }
      return streak;
    }

    // Calcula puntos de un usuario en un rango de partidos (por fecha)
    function calcDayScore(u, matchIds) {
      let pts = 0;
      for (const mid of matchIds) {
        const p = u.predictions?.[mid], r = results[mid];
        if(p && r) pts += calcMatchPts(p, r);
      }
      return pts;
    }

    // Agrupa partidos por fecha (día calendario)
    function getMatchdays() {
      const days = {};
      MATCHES.forEach(m => {
        if(!days[m.date]) days[m.date] = [];
        days[m.date].push(m.id);
      });
      return days;
    }

    // Encuentra el próximo partido (el más cercano en el futuro)
    function getNextMatch() {
      const now = new Date();
      return MATCHES.find(m => new Date(m.date+'T'+m.time+':00') > now);
    }

    function formatCountdown(ms) {
      if(ms <= 0) return '¡YA EMPEZÓ!';
      const d = Math.floor(ms/86400000);
      const h = Math.floor((ms%86400000)/3600000);
      const mn = Math.floor((ms%3600000)/60000);
      const s = Math.floor((ms%60000)/1000);
      if(d > 0) return d+'d '+h+'h '+mn+'m';
      if(h > 0) return h+'h '+mn+'m '+s+'s';
      return mn+'m '+s+'s';
    }

    // ── Calcula tabla de posiciones por grupo ──
    function calcGroupStandings() {
      const stats = {};
      Object.entries(GROUPS).forEach(([g, teams]) => {
        stats[g] = {};
        teams.forEach(t => { stats[g][t] = {pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,dg:0}; });
      });
      MATCHES.forEach(m => {
        const r = results[m.id];
        if (!r) return;
        const g = m.group, h = m.home, a = m.away;
        if (!stats[g]?.[h] || !stats[g]?.[a]) return;
        stats[g][h].pj++; stats[g][a].pj++;
        stats[g][h].gf += r.home; stats[g][h].gc += r.away;
        stats[g][a].gf += r.away; stats[g][a].gc += r.home;
        stats[g][h].dg = stats[g][h].gf - stats[g][h].gc;
        stats[g][a].dg = stats[g][a].gf - stats[g][a].gc;
        if (r.home > r.away) { stats[g][h].pts+=3; stats[g][h].pg++; stats[g][a].pp++; }
        else if (r.home < r.away) { stats[g][a].pts+=3; stats[g][a].pg++; stats[g][h].pp++; }
        else { stats[g][h].pts+=1; stats[g][h].pe++; stats[g][a].pts+=1; stats[g][a].pe++; }
      });
      groupStats = stats;
    }

    function getClub(clubId) {
      return CLUBS.find(c => c.id === clubId) || null;
    }

    function clubBadge(clubId, size=18) {

    // ── Pronósticos revelados cuando el partido empieza ──
    function renderRevealedPreds(matchId, res) {
      const players = Object.entries(allUsers).filter(([k,u])=>!Object.keys(PURE_ADMINS).includes(k)&&u.status==='approved');
      if (!players.length) return '';
      const rows = players.map(([key, u]) => {
        const pred = u.predictions?.[matchId];
        if (!pred) return `<div class="pred-row">
          <span class="pred-player">${u.name}</span>
          <span class="pred-score-val" style="color:var(--muted)">—</span>
          <span class="pred-pts pts-pending">Sin pronóstico</span>
        </div>`;
        let cls='', pts='', ptsCls='pts-pending';
        if (res) {
          const mp = calcMatchPts(pred, res);
          pts = mp > 0 ? '+'+mp+(mp===3?' ★':'') : '0';
          ptsCls = mp===3?'pts-3':mp>0?'pts-1':'pts-0';
          cls = mp===3?'correct-exact':mp>0?'correct-winner':'wrong';
        } else { pts='🔒'; }
        return `<div class="pred-row ${cls}">
          <span class="pred-player">${u.name}</span>
          <span class="pred-score-val">${pred.home}-${pred.away}</span>
          <span class="pred-pts ${ptsCls}">${pts}</span>
        </div>`;
      }).join('');
      return `<div class="preds-reveal">
        <div class="preds-reveal-title">👁 Pronósticos de todos</div>
        ${rows}
      </div>`;
    }

    function startListening() {
      if (unsubUsers) unsubUsers();
      if (unsubRes) unsubRes();
      if (unsubChat) unsubChat();

      unsubUsers = onSnapshot(collection(db,'users'), snap => {
        allUsers={}; snap.forEach(d=>{allUsers[d.id]=d.data();}); calcGroupStandings(); render();
      });
      unsubRes = onSnapshot(doc(db,'config','results'), snap => {
        results=snap.exists()?snap.data():{}; calcGroupStandings(); render();
      });

      const chatQ = query(collection(db,'chat'), orderBy('ts','asc'), limit(100));
      unsubChat = onSnapshot(chatQ, snap => {
        chatMessages = [];
        snap.forEach(d => chatMessages.push({id:d.id,...d.data()}));
        // Count unread
        const newUnread = chatMessages.filter(m=>m.ts&&m.ts.toMillis&&m.ts.toMillis()>lastSeenChat&&m.user!==currentUser).length;
        window.__unreadChat = newUnread;
        // Re-render nav badge without full re-render if in chat
        if(currentView==='chat'){
          lastSeenChat = Date.now();
          window.__unreadChat = 0;
          renderChatMessages();
        } else {
          // Just update the badge
          const badge = document.querySelector('.chat-badge');
          if(badge) badge.textContent = newUnread>0?newUnread:'';
        }
      });
    }

    // ── MINI-RANKING POR FECHA ──
    function renderMatchdayRanking() {
      const days = getMatchdays();
      // Encontrar el último día con resultados cargados
      const sortedDays = Object.keys(days).sort().reverse();
      let lastDayWithResults = null;
      for (const d of sortedDays) {
        if(days[d].some(mid => results[mid])) {
          lastDayWithResults = d;
          break;
        }
      }
      if(!lastDayWithResults) return '';

      const matchIds = days[lastDayWithResults];
      const playedCount = matchIds.filter(mid => results[mid]).length;
      const totalCount = matchIds.length;

      // Ranking de aprobados del día
      const approved = Object.entries(allUsers).filter(([k,u]) => !Object.keys(PURE_ADMINS).includes(k) && u.status === 'approved');
      const dayRanking = approved
        .map(([key, u]) => ({ key, name: u.name, club: u.club, pts: calcDayScore(u, matchIds) }))
        .filter(u => u.pts > 0)
        .sort((a,b) => b.pts - a.pts)
        .slice(0, 3);

      if(!dayRanking.length) return '';

      const dateObj = new Date(lastDayWithResults + 'T12:00:00');
      const dateStr = dateObj.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });

      const medals = ['🥇','🥈','🥉'];
      const rows = dayRanking.map((u,i) => `
        <div class="md-row ${u.key===currentUser?'me':''}">
          <span class="md-medal">${medals[i]}</span>
          ${u.club ? clubBadge(u.club, 18) : '<span style="width:18px"></span>'}
          <span class="md-name">${u.name}${u.key===currentUser?' (vos)':''}</span>
          <span class="md-pts">+${u.pts}</span>
        </div>`).join('');

      return `<div class="matchday-card">
        <div class="matchday-header">
          <span class="matchday-title">⭐ Top del día</span>
          <span class="matchday-date">${dateStr} · ${playedCount}/${totalCount} partidos</span>
        </div>
        ${rows}
      </div>`;
    }

      const ht = TEAMS[nextM.home]||{};
      const at = TEAMS[nextM.away]||{};

            <div class="next-match-team-name">${nextM.home}</div>

            <div class="next-match-countdown" id="next-match-countdown" data-ts="${new Date(nextM.date+'T'+nextM.time+':00').getTime()}">

            <div class="next-match-team-name">${nextM.away}</div>

    setInterval(() => {
      const el = document.getElementById('next-match-countdown');
      if(!el) return;
      const ts = parseInt(el.getAttribute('data-ts'));
      const diff = ts - Date.now();
      if(diff > -110*60000 && diff < 0) {
        el.textContent = '⚽ Jugando';
      } else if(diff > 0) {
        el.textContent = formatCountdown(diff);

    // ── PARTIDOS ──

        </div>`;

      return `${renderNextMatchBanner()}
        <div class="section-title">Partidos</div>
        <div class="filter-bar">
          ${Object.entries(labels).map(([k,v])=>`<button class="filter-btn ${matchFilter===k?'active':''}" onclick="window.__setFilter('${k}')">${v}</button>`).join('')}

    // ── TABLA ──
    function renderLeaderboard() {
      const ranking=Object.entries(allUsers).filter(([k,u])=>!Object.keys(PURE_ADMINS).includes(k)&&u.status==='approved')
        .map(([key,u])=>({key,name:u.name,club:u.club,streak:calcStreak(u),...calcScore(u),predCount:Object.keys(u.predictions||{}).length}))
        .sort((a,b)=>b.pts-a.pts||b.exact-a.exact);

      let podiumHTML = '';
      if(top3.length >= 1) {
        const medals = ['🥇','🥈','🥉'];
        const colors = ['#f5c842','#c0c0c0','#cd7f32'];
        const sizes = [1, 0.88, 0.82];
        // Orden visual: 2º, 1º, 3º (estilo podio real)
        const order = top3.length===3 ? [1,0,2] : top3.length===2 ? [1,0] : [0];
        const podiumCards = order.map(idx => {
          const u = top3[idx];
          const isMe = u.key === currentUser;
          return `<div class="podium-card ${isMe?'me':''}" style="transform:scale(${sizes[idx]})">

            <div class="podium-name">${u.name}${isMe?' 👤':''}</div>

            ${u.streak>=2?'<div class="podium-streak">🔥 '+u.streak+'</div>':''}
          </div>`;
        }).join('');
        podiumHTML = `<div class="podium-wrap"><div class="podium">${podiumCards}</div></div>`;
      }

      const rows=ranking.map((u,i)=>`<tr class="${u.key===currentUser?'highlight-row':''}">
        <td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':`<span class="rank-n">${i+1}</span>`}</td>
        <td>

    function renderMyPreds() {

      if(!entries.length) return `<div class="section-title">Mis Pronósticos</div>
        <div class="empty-state"><div class="icon">📝</div><p>Aún no hiciste ningún pronóstico.<br>¡Entrá a Partidos!</p></div>`;
      let totalPts=0;
      const items=entries.map(([mid,pred])=>{
        const match=MATCHES.find(m=>m.id==mid); if(!match) return '';
        const res=results[mid],ht=TEAMS[match.home]||{},at=TEAMS[match.away]||{};
        let tag='<span class="pred-result res-pending">Pendiente</span>';
        if(res){
          const mp = calcMatchPts(pred, res);
          totalPts += mp;
          if(mp===3) tag='<span class="pred-result res-exact">+3 pts ★</span>';
          else if(mp===2) tag='<span class="pred-result res-winner">+2 pts ✓</span>';
          else if(mp===1) tag='<span class="pred-result res-winner">+1 pt ✓</span>';
          else tag='<span class="pred-result res-wrong">0 pts ✗</span>';
        }
        return `<div class="pred-item">
          <div class="pred-match">
            <div style="display:flex;align-items:center;gap:6px;font-weight:600;font-size:13px">
              ${teamImg(match.home,18)} ${match.home} vs ${match.away} ${teamImg(match.away,18)}

          ${res?`<div style="font-size:11px;color:var(--muted);text-align:center">Real:<br><strong style="color:var(--text)">${res.home}-${res.away}</strong></div>`:''}
          ${tag}

      return `<div class="section-title">Mis Pronósticos</div>

    function renderChatMessagesHTML() {
      if(!chatMessages.length) return '<div style="text-align:center;color:var(--muted);padding:40px 0;font-size:14px">Nadie habló todavía.<br>¡Sé el primero! 👋</div>';
      let html = "";
      let lastDate = "";
      chatMessages.forEach(m => {
        const isMine = m.user === currentUser;
        const userName = allUsers[m.user]?.name || m.user;
        const ts = m.ts?.toDate ? m.ts.toDate() : new Date();
        const dateStr = ts.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
        const timeStr = ts.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
        if(dateStr !== lastDate) {
          html += "<div class=\"chat-date-sep\">"+dateStr+"</div>";
          lastDate = dateStr;
        }
        const initials = userName.substring(0,2).toUpperCase();
        html += "<div class=\"chat-msg-row "+(isMine?"mine":"")+"\">"+
          (!isMine?"<div class=\"chat-avatar\">"+initials+"</div>":"")+
          "<div class=\"chat-bubble "+(isMine?"mine":"")+"\">"+
          (!isMine?"<div class=\"chat-username\" style=\"display:flex;align-items:center;gap:4px\">"+(allUsers[m.user]?.club?'<img src="'+getClub(allUsers[m.user].club)?.crest+'" style="object-fit:contain">>':'')+userName+"</div>":"")+
          "<div class=\"chat-text\">"+escapeHtml(m.text)+"</div>"+
          "<div class=\"chat-time\">"+timeStr+"</div>"+
          "</div>"+
          (isMine?"<div class=\"chat-avatar mine\">"+initials+"</div>":"")+
          "</div>";
      });
      return html;
    }

    function renderChatMessages() {
      const el = document.getElementById("chat-messages");
      if(!el) return;
      el.innerHTML = renderChatMessagesHTML();

    function escapeHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── ACCIONES ──
    window.__toggleMode = ()=>{ isRegister=!isRegister; render(); };

    window.__selectRegClub = (elOrId, clubId) => {
      // Handle both (element, id) and (id) call signatures
      const id = clubId || elOrId;
      document.querySelectorAll('.reg-club-option').forEach(el => el.classList.remove('selected'));
      const el = document.getElementById('rco-'+id);
      if(el) el.classList.add('selected');
      window.__regClub = id;
      const club = CLUBS.find(c=>c.id===id);
      const sel = document.getElementById('reg-club-selected');
      if(sel && club) { sel.style.display='block'; sel.textContent='✓ '+club.name; }
    };
    window.__setView        = v =>{ currentView=v; render(); };
    window.__setFilter      = f =>{ matchFilter=f; render(); };
    window.__setAdminFilter = f =>{ adminFilter=f; render(); };

    window.__doLogin = async () => {
      const user=document.getElementById('inp-user').value.trim().toLowerCase();
      const pass=document.getElementById('inp-pass').value;
      const errEl=document.getElementById('login-error'),btn=document.getElementById('btn-submit');
      if(!user||!pass){errEl.innerHTML='<div class="error-msg">Completá todos los campos</div>';return;}
      if(PURE_ADMINS[user]&&PURE_ADMINS[user]===pass){currentUser=user;if(!allUsers[user])allUsers[user]={name:'Admin',predictions:{}};startListening();return;}
      btn.textContent='Verificando...';btn.disabled=true;
      try{
        const snap=await getDoc(doc(db,'users',user));
        if(!snap.exists()||snap.data().password!==pass){errEl.innerHTML='<div class="error-msg">Usuario o contraseña incorrectos</div>';btn.textContent='Entrar al prode';btn.disabled=false;return;}
        const userData = snap.data();
        // Player-admins bypass status check
        if(!PLAYER_ADMINS.includes(user)) {
          if(userData.status==='pending'||!userData.status){
            document.getElementById('app').innerHTML=renderPendingScreen(userData.name);
            btn.textContent='Entrar al prode';btn.disabled=false;
            return;
          }
          if(userData.status==='rejected'){
            errEl.innerHTML='<div class="error-msg">Tu cuenta fue rechazada por el administrador.</div>';
            btn.textContent='Entrar al prode';btn.disabled=false;
            return;
          }
        }
        currentUser=user;startListening();
      }catch(e){errEl.innerHTML='<div class="error-msg">Error de conexión</div>';btn.textContent='Entrar al prode';btn.disabled=false;}
    };

    window.__doRegister = async () => {
      const name=document.getElementById('inp-name')?.value.trim();
      const uname=document.getElementById('inp-user').value.trim().toLowerCase().replace(/\s+/g,'_');
      const pass=document.getElementById('inp-pass').value;
      const errEl=document.getElementById('login-error'),btn=document.getElementById('btn-submit');
      if(!name||!uname||!pass){errEl.innerHTML='<div class="error-msg">Completá todos los campos</div>';return;}
      if(pass.length<4){errEl.innerHTML='<div class="error-msg">Contraseña mínimo 4 caracteres</div>';return;}
      if(Object.keys(PURE_ADMINS).includes(uname)){errEl.innerHTML='<div class="error-msg">Ese usuario no está disponible</div>';return;}
      btn.textContent='Creando...';btn.disabled=true;
      try{
        const snap=await getDoc(doc(db,'users',uname));
        if(snap.exists()){errEl.innerHTML='<div class="error-msg">Ese usuario ya existe</div>';btn.textContent='Crear cuenta';btn.disabled=false;return;}
        const regClub = window.__regClub || null;
        await setDoc(doc(db,'users',uname),{name,password:pass,predictions:{},createdAt:Date.now(),status:'pending',...(regClub?{club:regClub}:{})});
        // Show waiting screen instead of logging in
        currentUser=null;
        document.getElementById('app').innerHTML=renderPendingScreen(name);
        return;
      }catch(e){errEl.innerHTML='<div class="error-msg">Error de conexión</div>';btn.textContent='Crear cuenta';btn.disabled=false;}
    };

    window.__logout = ()=>{
      if(unsubUsers){unsubUsers();unsubUsers=null;}if(unsubRes){unsubRes();unsubRes=null;}
      currentUser=null;currentView='matches';allUsers={};render();
    };

    window.__savePred = async (mid) => {
      const h=document.getElementById('h'+mid),a=document.getElementById('a'+mid);
      if(!h||!a||h.value===''||a.value===''){showToast('⚠️ Ingresá ambos marcadores','err');return;}
      try{
        await updateDoc(doc(db,'users',currentUser),{[`predictions.${mid}`]:{home:parseInt(h.value),away:parseInt(a.value)}});
        // Animar la tarjeta del partido
        const card = h.closest('.match-card');
        if(card) {
          card.classList.add('pulse-save');
          setTimeout(()=>card.classList.remove('pulse-save'), 800);
        }
        showToast('✅ Pronóstico guardado');
      } catch(e) {
        if(e.code==='permission-denied'){
          showToast('🚫 El partido ya empezó, no podés modificar','err');
        } else {
          showToast('❌ Error al guardar','err');
        }
      }
    };

    window.__saveResult = async (mid) => {
      const h=document.getElementById('adm-h'+mid),a=document.getElementById('adm-a'+mid);
      if(!h||!a||h.value===''||a.value===''){showToast('⚠️ Ingresá ambos goles','err');return;}
      try{await setDoc(doc(db,'config','results'),{[mid]:{home:parseInt(h.value),away:parseInt(a.value)}},{merge:true});showToast('✅ Resultado guardado');}
      catch(e){showToast('❌ Error al guardar','err');}
    };

    window.__clearResult = async (mid) => {
      if(!confirm('¿Borrar el resultado?')) return;
      try{const snap=await getDoc(doc(db,'config','results'));if(snap.exists()){const d=snap.data();delete d[mid];await setDoc(doc(db,'config','results'),d);}showToast('🗑 Resultado borrado');}
      catch(e){showToast('❌ Error al borrar','err');}
    };


    window.__showReactPicker = (msgId, bubble) => {
      // Eliminar picker anterior si existe
      document.querySelectorAll('.react-picker').forEach(p => p.remove());
      const picker = document.createElement('div');
      picker.className = 'react-picker';
      const emojis = ['👏','😂','🔥','⚽','💪','😮'];
      picker.innerHTML = emojis.map(e =>
        '<span class="react-picker-emoji" onclick="event.stopPropagation();window.__toggleReact(\''+msgId+'\',\''+e+'\');">' + e + '</span>'
      ).join('');
      bubble.parentElement.appendChild(picker);
      // Cerrar al tocar fuera
      setTimeout(()=>{
        document.addEventListener('click', function closePicker(ev){
          if(!picker.contains(ev.target)) {
            picker.remove();
            document.removeEventListener('click', closePicker);
          }
        });
      }, 50);
    };

    window.__toggleReact = async (msgId, emoji) => {
      document.querySelectorAll('.react-picker').forEach(p => p.remove());
      const msg = chatMessages.find(m => m.id === msgId);
      if(!msg) return;
      const current = msg.reactions?.[currentUser];
      try {
        const newReacts = {...(msg.reactions||{})};
        if(current === emoji) {
          // Quitar reacción
          delete newReacts[currentUser];
        } else {
          newReacts[currentUser] = emoji;
        }
        await updateDoc(doc(db,'chat',msgId), { reactions: newReacts });
      } catch(e) {
        showToast('❌ No se pudo reaccionar', 'err');
      }
    };

    window.__sendChat = async () => {
      const input = document.getElementById('chat-input');
      if(!input) return;
      const text = input.value.trim();
      if(!text) return;
      input.value = '';
      const userName = allUsers[currentUser]?.name || currentUser;
      try {
        await addDoc(collection(db,'chat'), {
          user: currentUser,
          name: userName,
          text,
          ts: serverTimestamp()
        });
      } catch(e) {
        showToast('❌ Error al enviar','err');
      }
    };

    window.__deleteUser = async (uname) => {
      if(!confirm(`¿Borrar el usuario @${uname}? Se eliminan sus datos y pronósticos. Esta acción no se puede deshacer.`)) return;
      try {
        await deleteDoc(doc(db,'users',uname));
        showToast('🗑 Usuario @'+uname+' eliminado');
      } catch(e) {
        showToast('❌ Error al borrar: '+e.message,'err');
      }
    };

    window.__selectClub = async (clubId) => {
      try {
        await setDoc(doc(db,'users',currentUser),{club: clubId},{merge:true});
        showToast('✅ Equipo guardado: ' + getClub(clubId)?.name);
        // Re-render profile to show selection
        render();
      } catch(e) {
        showToast('❌ Error al guardar','err');
      }
    };

    window.__approveUser = async (uname) => {
      try {
        await setDoc(doc(db,'users',uname),{status:'approved'},{merge:true});
        showToast('✅ Usuario aprobado');
      } catch(e) {
        console.error('approve error:',e);
        showToast('❌ Error: ' + e.message,'err');
      }
    };

    window.__rejectUser = async (uname) => {
      if(!confirm('¿Rechazar a este usuario? No podrá ingresar al prode.')) return;
      try {
        await setDoc(doc(db,'users',uname),{status:'rejected'},{merge:true});
        showToast('🚫 Usuario rechazado');
      } catch(e) {
        console.error('reject error:',e);
        showToast('❌ Error: ' + e.message,'err');
      }
    };

    render();
  </script>
</body>
</html>
